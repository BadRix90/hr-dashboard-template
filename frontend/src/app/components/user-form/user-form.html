<div class="user-form">
  <h2>Neuer Mitarbeiter</h2>

  <form [formGroup]="userForm" (ngSubmit)="submitForm()">
    <div class="form-row">
      <div class="form-group">
        <label for="first_name">Vorname:</label>
        <input type="text" id="first_name" formControlName="first_name" required>
      </div>

      <div class="form-group">
        <label for="last_name">Nachname:</label>
        <input type="text" id="last_name" formControlName="last_name" required>
      </div>
    </div>

    <div class="form-group">
      <label for="username">Benutzername:</label>
      <input type="text" id="username" formControlName="username" required>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" formControlName="email" required>
    </div>

    <div class="form-group">
      <label for="password">Passwort:</label>
      <input type="password" id="password" formControlName="password" required>
      <small>Mindestens 8 Zeichen</small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="role">Rolle:</label>
        <select id="role" formControlName="role">
          @for (role of roles; track role) {
            <option [value]="role">{{ getRoleLabel(role) }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="vacation_days">Urlaubstage:</label>
        <input type="number" id="vacation_days" formControlName="vacation_days" min="0">
      </div>
    </div>

    <div class="form-group">
      <label for="department">Abteilung:</label>
      <input type="text" id="department" formControlName="department">
    </div>

    <button type="submit" class="btn-primary" [disabled]="userForm.invalid">
      Mitarbeiter anlegen
    </button>
  </form>
</div>
